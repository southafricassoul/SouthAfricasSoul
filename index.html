<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <link href="/vite.svg" rel="icon" type="image/svg+xml"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   SouthAfrica's Soul Herbal Wellness Site
  </title>
  <style id="fm-styles">
   /* --- FM Launcher design --- */
        .fm-launcher {
          position: fixed;
          bottom: 24px;
          right: 24px;
          width: 56px;
          height: 56px;
          border-radius: 50%;
          background: linear-gradient(135deg, #0A1F44, #028090);
          border: none;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 4px 20px rgba(10,31,68,.3), 0 0 0 0 rgba(2,128,144,.4);
          animation: launcherpulse 3s infinite;
          z-index: 9999;
          transition: transform .15s;
        }
        .fm-launcher:hover { transform: scale(1.08); }
        @keyframes launcherpulse {
          0%,100% { box-shadow: 0 4px 20px rgba(10,31,68,.3), 0 0 0 0 rgba(2,128,144,.4); }
          50% { box-shadow: 0 4px 20px rgba(10,31,68,.3), 0 0 0 10px rgba(2,128,144,.0); }
        }
        .fm-launcher svg { width: 26px; height: 26px; fill: #ffffff; }
        .fm-notif-dot {
          position: absolute; top: 2px; right: 2px;
          width: 12px; height: 12px; border-radius: 50%;
          background: #E53935; border: 2px solid #ffffff;
          display: none;
        }

        /* --- Widget Container --- */
        .fm-widget-container {
            position: fixed;
            bottom: 96px;
            right: 24px;
            width: 400px;
            height: 600px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 120px);
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 48px rgba(10,31,68,0.18);
            z-index: 9998;
            overflow: hidden;
            display: none;
            flex-direction: column;
            transform-origin: bottom right;
            animation: widgetIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes widgetIn {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fm-widget-container.active { display: flex; }

        iframe { border: none; width: 100%; height: 100%; }

        @media (max-width: 480px) {
            .fm-widget-container {
                bottom: 0; right: 0; width: 100vw; height: 100vh;
                max-width: 100%; max-height: 100%; border-radius: 0;
            }
            .fm-launcher { bottom: 12px; right: 12px; }
        }
  </style>
 </head>
 <body>
  <div id="root">
  </div>
  <script src="/src/main.tsx" type="module">
  </script>
  <!-- FM Assist Chat Widget -->
  <button class="fm-launcher" onclick="toggleFM()">
   <svg id="fm-icon-open" viewbox="0 0 24 24">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z">
    </path>
   </svg>
   <svg id="fm-icon-close" style="display:none" viewbox="0 0 24 24">
    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z">
    </path>
   </svg>
   <div class="fm-notif-dot" id="fm-dot">
   </div>
  </button>
  <div class="fm-widget-container" id="fm-container">
   <iframe id="fm-iframe" src="/embed.html">
   </iframe>
  </div>
  <script>
   function toggleFM() {
            const container = document.getElementById('fm-container');
            const openIcon = document.getElementById('fm-icon-open');
            const closeIcon = document.getElementById('fm-icon-close');
            const dot = document.getElementById('fm-dot');

            container.classList.toggle('active');

            if (container.classList.contains('active')) {
                openIcon.style.display = 'none';
                closeIcon.style.display = 'block';
                dot.style.display = 'none';
            } else {
                openIcon.style.display = 'block';
                closeIcon.style.display = 'none';
            }
        }

        // Auto-show notification dot after 2 seconds
        setTimeout(() => {
            if (!document.getElementById('fm-container').classList.contains('active')) {
                document.getElementById('fm-dot').style.display = 'block';
            }
        }, 2000);
  </script>
 </body>
</html>
