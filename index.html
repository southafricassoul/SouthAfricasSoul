<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SouthAfrica&#39;s Soul Herbal Wellness Site</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
 <!-- FM Assist Chat Widget -->
<div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; width: 350px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; font-family: sans-serif; z-index: 1000;">
    <div id="chat-header" style="background: #007bff; color: white; padding: 15px; font-weight: bold; text-align: center;">FM Assist Chatbot</div>
    <div id="chat-messages" style="flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
        <div style="padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; background: #e9ecef; align-self: flex-start; white-space: pre-wrap;">Hello! I am FM Assist. Please provide the store or branch name you are reporting from.</div>
    </div>
    <div style="padding: 10px; display: flex; border-top: 1px solid #eee;">
        <input type="text" id="chat-input" placeholder="Type a message..." style="flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 5px; outline: none;">
        <button id="chat-send" style="background: #007bff; color: white; border: none; padding: 8px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer;">Send</button>
    </div>
</div>

<script>
    (function() {
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const sessionId = 'session-' + Math.random().toString(36).substr(2, 9);
        
        // --- CONFIGURATION ---
        // Once you deploy to Vercel, change this URL to your Vercel URL
        const BACKEND_URL = 'https://cs-fm-assist.vercel.app/api/chat'; 
        const SECRET = 'FM_ASSIST_SECRET'; // This must match what you put in Vercel
        // ---------------------

        function addMsg(text, isUser) {
            const div = document.createElement('div');
            div.style = isUser 
                ? "padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; background: #007bff; color: white; align-self: flex-end;"
                : "padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; background: #e9ecef; align-self: flex-start; white-space: pre-wrap;";
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function send() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            addMsg(msg, true);
            chatInput.value = '';
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-fm-secret': SECRET },
                    body: JSON.stringify({ sessionId, message: msg })
                });
                const data = await res.json();
                addMsg(data.reply, false);
            } catch (e) { addMsg("Error connecting to chatbot.", false); }
        }
        chatSend.onclick = send;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') send(); };
    })();
</script>
  </body>
</html>
